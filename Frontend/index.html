<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MetalStock Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>MetalStock: Gestión de Taller</h1>
    
    <div style="display: flex; gap: 20px; flex-wrap: wrap;">
        <div class="card" style="flex: 1; min-width: 300px;">
            <h2>📦 Inventario Global</h2>
            <input type="text" id="mNombre" placeholder="Nombre Material">
            <div style="display: flex; gap: 5px;">
                <input type="number" id="mCant" placeholder="Cant." min="1">
                <select id="mUnidad">
                    <option value="Metros">Metros</option>
                    <option value="Und">Unidades</option>
                    <option value="Kg">Kg</option>
                    <option value="Gal">Galones</option>
                </select>
            </div>
            <button onclick="guardarMat()">Guardar en Stock</button>
            <table id="tablaMat" style="width: 100%; margin-top: 20px;"></table>
        </div>

        <div class="card" style="flex: 1; min-width: 300px;">
            <h2>👥 Clientes y Trabajos</h2>
            <input type="text" id="cNombre" placeholder="Nombre Cliente">
            <input type="text" id="cTrabajo" placeholder="Trabajo (Ej: Reja)">
            <button onclick="guardarCli()">Registrar Proyecto</button>
            <hr>
            <h3>Asignar Material</h3>
            <select id="selectCli" onchange="verHistorial()"></select>
            <select id="selectMat"></select>
            <input type="number" id="vCant" placeholder="Cantidad a usar" min="0.1" step="0.1">
            <button onclick="vincular()" style="background-color: #27ae60;">Asignar al Cliente</button>
        </div>

        <div class="card" style="flex: 1; min-width: 300px; border-top: 5px solid #e67e22;">
            <h2>📋 Detalle por Cliente</h2>
            <div id="historialCliente"></div>
        </div>
    </div>

    <script>
        const API = "http://localhost:5000/api";

        async function cargarTodo() {
            const resM = await fetch(`${API}/materiales`);
            const materiales = await resM.json();
            const t = document.getElementById('tablaMat');
            const sM = document.getElementById('selectMat');
            t.innerHTML = "<tr><th>Material</th><th>Stock</th></tr>";
            sM.innerHTML = "";
            materiales.forEach(m => {
                t.innerHTML += `<tr><td>${m.nombre}</td><td>${m.cantidad} ${m.unidad}</td></tr>`;
                sM.innerHTML += `<option value="${m.id}">${m.nombre} (Stock: ${m.cantidad})</option>`;
            });

            const resC = await fetch(`${API}/clientes`);
            const clientes = await resC.json();
            const sC = document.getElementById('selectCli');
            sC.innerHTML = "<option value=''>-- Seleccionar Cliente --</option>";
            clientes.forEach(c => {
                sC.innerHTML += `<option value="${c.id}">${c.nombre}</option>`;
            });
        }

        async function guardarMat() {
            const nombre = document.getElementById('mNombre').value;
            const cantidad = document.getElementById('mCant').value;
            
            if(cantidad <= 0) return alert("Error: La cantidad debe ser mayor a 0");

            await fetch(`${API}/materiales`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    nombre: nombre,
                    cantidad: cantidad,
                    unidad: document.getElementById('mUnidad').value
                })
            });
            cargarTodo();
        }

        async function guardarCli() {
            await fetch(`${API}/clientes`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    nombre: document.getElementById('cNombre').value,
                    trabajo: document.getElementById('cTrabajo').value
                })
            });
            cargarTodo();
        }

        async function vincular() {
            const clienteId = document.getElementById('selectCli').value;
            const cantidad = document.getElementById('vCant').value;
            
            if(!clienteId) return alert("Selecciona un cliente primero");
            if(cantidad <= 0) return alert("Error: No puedes asignar cantidades negativas o cero");

            const response = await fetch(`${API}/vincular`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    cliente_id: clienteId,
                    material_id: document.getElementById('selectMat').value,
                    cantidad: cantidad
                })
            });

            if (!response.ok) {
                const err = await response.json();
                alert(err.error); // Esto mostrará el error de "Stock insuficiente" del backend
            }

            cargarTodo();
            verHistorial();
        }

        async function verHistorial() {
            const clienteId = document.getElementById('selectCli').value;
            const div = document.getElementById('historialCliente');
            if(!clienteId) { div.innerHTML = ""; return; }

            const res = await fetch(`${API}/reporte/${clienteId}`);
            const data = await res.json();
            div.innerHTML = "<ul>";
            data.forEach(item => {
                div.innerHTML += `
                    <li style="margin-bottom:10px;">
                        ${item.cantidad_gastada} - ${item.material_nombre} 
                        <button onclick="desvincular(${item.id})" style="width:auto; padding:2px 10px; background:red; font-size:12px;">Quitar</button>
                    </li>`;
            });
            div.innerHTML += "</ul>";
        }

        async function desvincular(idConsumo) {
            await fetch(`${API}/desvincular`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ consumo_id: idConsumo })
            });
            cargarTodo();
            verHistorial();
        }

        cargarTodo();
    </script>
</body>
</html>
